name: smb_server
category: files
description: Start an Impacket SMB server from the working directory
tags:
  - impacket
  - smb
  - files
options:
  share_name:
    description: SMB share name
    required: false
    default: "share"
  workdir:
    description: Directory to share
    required: true
template: |
  impacket-smbserver {{share_name}} {{workdir}} -smb2support
