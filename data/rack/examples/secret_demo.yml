name: secret_demo
category: examples
description: Demonstrate secret and environment variable rendering
tags:
  - secrets
  - demo
options:
  username:
    description: Example username
    required: true
  password:
    description: Example password stored as a secret option
    required: true
    secret: true
template: |
  echo "User: {{username}}"
  echo "Password: {{secret "password"}}"
  echo "Home: {{env "HOME"}}"
